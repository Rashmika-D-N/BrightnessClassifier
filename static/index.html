<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMIAI - Brightness Classifier</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #09090b;
            --bg-panel: #0e0e11;
            --border-color: #27272a;
            --border-hover: #3f3f46;
            --primary: #fbbf24;
            --primary-hover: #f59e0b;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            display: flex;
            align-items: center;
            padding: 1.5rem 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background-color: var(--primary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            color: var(--bg-dark);
        }

        .logo-icon svg {
            width: 20px;
            height: 20px;
        }

        .logo-text {
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: 0.5px;
            margin-right: 16px;
        }

        .beta-badge {
            display: flex;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        .beta-dot {
            width: 6px;
            height: 6px;
            background-color: #22c55e;
            border-radius: 50%;
            margin-right: 6px;
            box-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
        }

        /* Main Content */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .workspace-panel {
            width: 100%;
            max-width: 1000px;
            background-color: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            min-height: 60vh;
            position: relative;
        }

        .upload-area {
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            width: 100%;
            height: 100%;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            background-color: rgba(255,255,255,0.01);
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--primary);
            background-color: rgba(251, 191, 36, 0.05);
        }

        .upload-icon {
            width: 48px;
            height: 48px;
            background-color: rgba(255,255,255,0.05);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            color: var(--text-muted);
        }

        .upload-text {
            font-weight: 500;
            font-size: 1.1rem;
            margin-bottom: 8px;
        }

        .upload-subtext {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .file-input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        /* Image Preview Area */
        .preview-wrapper {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            align-items: center;
        }

        .image-container {
            width: 100%;
            max-height: 600px;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            background: #000;
            position: relative;
        }

        .preview-image {
            max-width: 100%;
            max-height: 600px;
            object-fit: contain;
        }

        /* Result Badge */
        .result-badge {
            position: absolute;
            bottom: 24px;
            background: rgba(9, 9, 11, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border-color);
            padding: 12px 24px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transform: translateY(20px);
            opacity: 0;
            animation: slideUp 0.5s forwards ease-out;
        }

        @keyframes slideUp {
            to { transform: translateY(0); opacity: 1; }
        }

        .result-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .result-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary);
        }

        .result-value.very-dark {
            color: #ef4444; /* red for very dark to stand out, or keep yellow */
        }

        .controls {
            margin-top: 24px;
            display: flex;
            gap: 16px;
            width: 100%;
            justify-content: center;
        }

        .btn {
            background-color: var(--primary);
            color: var(--bg-dark);
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background-color: rgba(255,255,255,0.05);
            border-color: var(--border-hover);
        }

        /* Loader */
        .loader-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(14, 14, 17, 0.8);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            z-index: 10;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(251, 191, 36, 0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

    </style>
</head>
<body>

    <header>
        <div class="logo-icon">
            <!-- Simple star/dot SVG to match reference logo -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M12 2v2"></path>
                <path d="M12 20v2"></path>
                <path d="M4.93 4.93l1.41 1.41"></path>
                <path d="M17.66 17.66l1.41 1.41"></path>
                <path d="M2 12h2"></path>
                <path d="M20 12h2"></path>
                <path d="M6.34 17.66l-1.41 1.41"></path>
                <path d="M19.07 4.93l-1.41 1.41"></path>
            </svg>
        </div>
        <div class="logo-text">LUMIAI</div>
        <div class="beta-badge">
            <div class="beta-dot"></div>
            Beta
        </div>
    </header>

    <main>
        <div class="workspace-panel">
            
            <form id="uploadForm" style="width: 100%; height: 100%; flex: 1; display: flex; flex-direction: column;">
                
                <div class="upload-area" id="dropZone">
                    <div class="upload-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    </div>
                    <div class="upload-text">Click to upload or drag an image</div>
                    <div class="upload-subtext">Supports JPG, PNG, WEBP</div>
                    <input type="file" id="imageInput" class="file-input" accept="image/*" required>
                </div>

                <div class="preview-wrapper" id="previewWrapper">
                    <div class="image-container">
                        <img id="imagePreview" class="preview-image" src="" alt="Preview">
                        
                        <!-- Floating Result Badge -->
                        <div class="result-badge" id="resultBadge" style="display: none;">
                            <span class="result-label">Analyzed Brightness:</span>
                            <span class="result-value" id="resultValue">--</span>
                        </div>
                    </div>
                    
                    <div class="controls">
                        <button type="button" class="btn btn-secondary" id="resetBtn">
                            Upload New Image
                        </button>
                        <button type="submit" class="btn" id="submitBtn">
                            Run Model
                        </button>
                    </div>
                </div>

                <div class="loader-overlay" id="loader">
                    <div class="spinner"></div>
                </div>

            </form>
        </div>
    </main>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('imageInput');
        const previewWrapper = document.getElementById('previewWrapper');
        const imagePreview = document.getElementById('imagePreview');
        const uploadForm = document.getElementById('uploadForm');
        const resultBadge = document.getElementById('resultBadge');
        const resultValue = document.getElementById('resultValue');
        const loader = document.getElementById('loader');
        const submitBtn = document.getElementById('submitBtn');
        const resetBtn = document.getElementById('resetBtn');

        // Handle file selection
        fileInput.addEventListener('change', handleFile);
        
        // Drag events
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
        });

        dropZone.addEventListener('drop', (e) => {
            const dt = e.dataTransfer;
            const file = dt.files[0];
            fileInput.files = dt.files;
            handleFile();
        });

        function handleFile() {
            const file = fileInput.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    imagePreview.src = e.target.result;
                    dropZone.style.display = 'none';
                    previewWrapper.style.display = 'flex';
                    resultBadge.style.display = 'none';
                    submitBtn.style.display = 'flex';
                }
                reader.readAsDataURL(file);
            }
        }

        resetBtn.addEventListener('click', () => {
            fileInput.value = '';
            dropZone.style.display = 'flex';
            previewWrapper.style.display = 'none';
            resultBadge.style.display = 'none';
        });

        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const file = fileInput.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            // Show Loading
            loader.style.display = 'flex';
            submitBtn.style.display = 'none'; // hide submit after clicking
            resultBadge.style.display = 'none';

            try {
                const response = await fetch('/classify', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error('Classification failed.');

                const data = await response.json();
                
                // Show result
                const formattedCat = data.category.replace('_', ' ').toUpperCase();
                resultValue.textContent = formattedCat;
                resultValue.className = 'result-value ' + data.category.replace('_', '-');
                
                // Show floating badge
                resultBadge.style.display = 'flex';
                // Trigger animation reflow
                resultBadge.style.animation = 'none';
                resultBadge.offsetHeight; /* trigger reflow */
                resultBadge.style.animation = null; 
                
            } catch (error) {
                alert(error.message);
                submitBtn.style.display = 'flex'; // restore if error
            } finally {
                loader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
